name: Deploy By SSH Pull

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_DIR: /opt/cicd-app
          APP_BRANCH: main
          REPO_URL: git@github.com:${{ github.repository }}.git
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: APP_DIR,APP_BRANCH,REPO_URL
          script: |
            set -e
            if [ ! -d "$APP_DIR/.git" ]; then
              mkdir -p "$APP_DIR"
              git clone -b "$APP_BRANCH" "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            chmod +x scripts/deploy.sh
            APP_DIR="$APP_DIR" APP_BRANCH="$APP_BRANCH" REPO_URL="$REPO_URL" ./scripts/deploy.sh
